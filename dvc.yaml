stages:
  preprocess:
    cmd: python src/data_processing.py
    deps:
    - data/raw_data/household_power_consumption.txt
    - src/data_processing.py
    outs:
    - data/processed/test.csv
    - data/processed/train.csv

  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/train.csv
      - params.yaml
    params:
      - model
      - features
    outs:
      - model/xgb_model.pkl
    metrics:
      - model/metrics.json