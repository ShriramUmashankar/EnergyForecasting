global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # Uses Docker's internal network to talk straight to the container
          - "alertmanager:9093"

scrape_configs:
  - job_name: "fastapi-backend"
    static_configs:
      - targets: 
        # Replace 'fastapi-backend' with exactly whatever you named 
        # your API service in your docker-compose.yml!
        - "fastapi-backend:8000"

  - job_name: "node-exporter"
    static_configs:
      - targets: 
        - "node-exporter:9100"