global:
  smtp_smarthost: 'sandbox.smtp.mailtrap.io:2525'
  smtp_from: 'alertmanager@appmonitoring.com'
  smtp_auth_username: 'username'
  smtp_auth_password: 'password'
  smtp_require_tls: true

route:
  receiver: 'email-alerts'
  group_by: ['alertname']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 5m

receivers:
- name: 'email-alerts'
  email_configs:
  - to: 'your.personal.email@example.com'  # Placeholder    
        
        